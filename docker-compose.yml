services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: financeflow
      POSTGRES_PASSWORD: financeflow
      POSTGRES_DB: financeflow
    ports:
      - "5433:5432"
    volumes:
      - financeflow-db-data:/var/lib/postgresql/data

volumes:
  financeflow-db-data:
